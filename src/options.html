<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Focusd Settings</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="page calm-page settings-page">
    <main class="settings">
      <h1>Pause list</h1>
      <form id="form">
        <label for="domains">Domains</label>
        <textarea id="domains" spellcheck="false" rows="9" aria-describedby="domains-help"></textarea>
        <div class="actions">
          <button id="reset" class="secondary" type="button">Reset</button>
          <button class="primary" type="submit">Save</button>
        </div>
      </form>
      <p id="status" class="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
